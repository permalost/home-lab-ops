---
version: "3"

tasks:
  validate:
    desc: Validation script to be run locally before merged into Flux in-cluster.
    cmds:
      - sh scripts/validate.sh
  tools:
    desc: Install tools via Homebrew and install pre-commit hooks
    cmds:
      - brew bundle
      - pre-commit install
  pre-commit:
    desc: Run all pre-commit hooks against every tracked file
    cmds:
      - pre-commit run --all-files
