repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
      - id: detect-private-key
  - repo: https://github.com/onedr0p/sops-pre-commit
    rev: v2.1.1
    hooks:
      - id: forbid-secrets
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - --config-file
          - .yamllint.yaml
        exclude: |
          (?x)^(
            kubernetes/clusters/.*/flux-system/gotk-components\.yaml|
            kubernetes/bootstrap/.*|
            kubernetes/clusters/na/settings/.*|
            .*/secret\.ya?ml|
            .*/configMap.*\.ya?ml|
            .*\.sops\.ya?ml
          )$
  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.30
    hooks:
      - id: terraform-fmt
  - repo: local
    hooks:
      - id: taskfile-lint
        name: Taskfile lint
        language: system
        entry: task --list-all --silent
        pass_filenames: false
        files: Taskfile.*\.yml
