---
name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.x"
      - name: Install task
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo go-task/task --pattern 'task_linux_amd64.tar.gz' \
            --output /tmp/task.tar.gz && tar -xzf /tmp/task.tar.gz -C /usr/local/bin task
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

  manifests:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo yannh/kubeconform --pattern 'kubeconform-linux-amd64.tar.gz' \
            --output /tmp/kubeconform.tar.gz && tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          gh release download --repo kubernetes-sigs/kustomize --tag 'kustomize/v5.4.3' \
            --pattern 'kustomize_v5.4.3_linux_amd64.tar.gz' \
            --output /tmp/kustomize.tar.gz && tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin kustomize
          gh release download --repo mikefarah/yq --pattern 'yq_linux_amd64' \
            --output /usr/local/bin/yq && chmod +x /usr/local/bin/yq
          gh release download --repo stackrox/kube-linter --pattern 'kube-linter-linux.tar.gz' \
            --output /tmp/kube-linter.tar.gz && tar -xzf /tmp/kube-linter.tar.gz -C /usr/local/bin kube-linter
          gh release download --repo go-task/task --pattern 'task_linux_amd64.tar.gz' \
            --output /tmp/task.tar.gz && tar -xzf /tmp/task.tar.gz -C /usr/local/bin task

      - name: Install flux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo fluxcd/flux2 --pattern 'flux_*_linux_amd64.tar.gz' \
            --output /tmp/flux.tar.gz && tar -xzf /tmp/flux.tar.gz -C /usr/local/bin flux

      - name: Install Talos tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo budimanjojo/talhelper --pattern 'talhelper_linux_amd64.tar.gz' \
            --output /tmp/talhelper.tar.gz && tar -xzf /tmp/talhelper.tar.gz -C /usr/local/bin talhelper

      - name: Run validate script
        run: bash scripts/validate.sh

      - name: Offline render — orion
        run: bash scripts/flux-build.sh orion

      - name: Offline render — na
        run: bash scripts/flux-build.sh na

  talos:
    name: Validate Talos config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Install talhelper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo budimanjojo/talhelper --pattern 'talhelper_linux_amd64.tar.gz' \
            --output /tmp/talhelper.tar.gz && tar -xzf /tmp/talhelper.tar.gz -C /usr/local/bin talhelper

      - name: Validate talconfig schema
        working-directory: clusters/orion
        run: talhelper validate talconfig
