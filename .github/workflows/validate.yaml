---
name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.1

  manifests:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            -o /tmp/kubeconform.tar.gz && tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          curl -fsSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz \
            -o /tmp/kustomize.tar.gz && tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin kustomize
          curl -fsSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o /usr/local/bin/yq && chmod +x /usr/local/bin/yq
          curl -fsSL https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter_linux_amd64.tar.gz \
            -o /tmp/kube-linter.tar.gz && tar -xzf /tmp/kube-linter.tar.gz -C /usr/local/bin kube-linter

      - name: Run validate script
        run: bash scripts/validate.sh
