# Network configuration patch template for VLAN setup
# Node-specific IPs will be merged in individual configs

machine:
  network:
    interfaces:
      - interface: enp2s0
        vlans:
          - vlanId: 50
            mtu: 1500
            dhcp: false
            routes:
              - network: 0.0.0.0/0
                gateway: 10.50.0.1
          # VLAN 10 - Management network
          - vlanId: 10
            mtu: 1500
            dhcp: false
    # DNS configuration
    nameservers:
      # - 10.60.0.53  # Pihole (when deployed)
      - 1.1.1.1     # Cloudflare fallback
      - 8.8.8.8     # Google fallback
    
    # Extra hosts file entries
    extraHostEntries:
      - ip: 10.50.0.10
        aliases:
          - orion-api.norseamerican.com
          - api.orion.norseamerican.com
      - ip: 10.50.0.11
        aliases:
          - orion-cp-01.norseamerican.com
      - ip: 10.50.0.12
        aliases:
          - orion-cp-02.norseamerican.com
      - ip: 10.50.0.13
        aliases:
          - orion-cp-03.norseamerican.com
