# Beelink GK Mini hardware configuration — control plane nodes
# Trunk NIC is enp2s0; boot disk identified by SATA path

machine:
  install:
    disk: /dev/disk/by-path/pci-0000:00:12.0-ata-1
    wipe: true
    image: ghcr.io/siderolabs/installer:v1.12.1
  network:
    interfaces:
      - interface: enp2s0
        dhcp: false
        vlans:
          - vlanId: 50
            mtu: 1500
            dhcp: false
            routes:
              - network: 0.0.0.0/0
                gateway: 10.50.0.1
          - vlanId: 10
            mtu: 1500
            dhcp: false
