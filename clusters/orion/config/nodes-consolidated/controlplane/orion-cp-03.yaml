# Control plane node 03 specific configuration
# Beelink GK Mini #3 — disk identified by serial via by-id

version: v1alpha1
debug: false
persist: true

machine:
  type: controlplane
  install:
    disk: /dev/disk/by-id/ata-ORICO_250929CA12802668
    wipe: true
    image: ghcr.io/siderolabs/installer:v1.12.1
  network:
    hostname: orion-cp-03
    interfaces:
      - interface: enp2s0
        vlans:
          - vlanId: 50
            addresses:
              - 10.50.0.13/24
          - vlanId: 10
            addresses:
              - 10.10.0.13/24
  certSANs:
    - 10.50.0.13
    - 10.10.0.13
    - orion-cp-03.norseamerican.com
