# Worker node 01 specific configuration
# Bosgame — trunk NIC is enp1s0, boot disk is Kingston 1 TB NVMe

version: v1alpha1
debug: false
persist: true

machine:
  type: worker
  install:
    disk: /dev/disk/by-id/nvme-KINGSTON_OM8PGP41024N-A0_50026B7383880325
    wipe: true
    image: ghcr.io/siderolabs/installer:v1.12.1
  network:
    hostname: orion-w-01
    interfaces:
      - interface: enp1s0
        vlans:
          - vlanId: 50
            addresses:
              - 10.50.0.21/24
          - vlanId: 10
            addresses:
              - 10.10.0.21/24
  certSANs:
    - 10.50.0.21
    - 10.10.0.21
    - orion-w-01.norseamerican.com
