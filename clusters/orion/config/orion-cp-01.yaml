# Talos machine configuration template for orion-cp-01
# Beelink GK Mini #1
# This will be merged with patches and secrets by generation script

version: v1alpha1
debug: false
persist: true

machine:
  type: controlplane
  install:
    diskSelector:
      size: '>= 100GB'
    wipe: true
    image: ghcr.io/siderolabs/installer:v1.12.1
  network:
    hostname: orion-cp-01
    interfaces:
      - interface: eth0
        dhcp: false
        routes:
          - gateway: 10.50.0.1
        vlans:
          - vlanId: 50
            addresses:
              - 10.50.0.11/24
            routes:
              - network: 0.0.0.0/0
                gateway: 10.50.0.1
          - vlanId: 10
            addresses:
              - 10.10.0.11/24

  # Certificate SANs specific to this node
  certSANs:
    - 10.50.0.11          # This node K8s IP
    - 10.10.0.11          # This node management IP
    - orion-cp-01.norseamerican.com
