# talhelper configuration for the orion cluster
# Generate machineconfigs: task talos:gen-config
# Reference: https://budimanjojo.github.io/talhelper/latest/reference/configuration/

clusterName: orion
talosVersion: v1.12.1
kubernetesVersion: v1.33.0
endpoint: https://10.50.0.10:6443

# CNI is managed by Cilium; disable built-in CNI and kube-proxy
cniConfig:
  name: none

# Additional SANs added to the API server certificate
additionalApiServerCertSans:
  - 10.50.0.10
  - orion-api.norseamerican.com

clusterPodNets:
  - 10.241.0.0/16
clusterSvcNets:
  - 10.141.0.0/16

# Cluster-wide patches applied to every node
patches:
  - "@./patches/cluster/00-features.yaml"
  - "@./patches/cluster/10-network-common.yaml"
  - "@./patches/cluster/20-kubelet-common.yaml"
  - "@./patches/cluster/30-cilium-prep.yaml"

# Control-plane role patches applied in addition to cluster patches
controlPlane:
  patches:
    - "@./patches/controlplane/00-etcd.yaml"
    - "@./patches/controlplane/10-apiserver.yaml"
    - "@./patches/controlplane/20-allow-scheduling.yaml"

nodes:
  # ── Control Plane ─────────────────────────────────────────────────────────
  # Hardware: Beelink GK Mini — trunk NIC is enp2s0 on all three units
  # Boot disk: SATA SSD (128 GB), identified by serial via by-id

  - hostname: orion-cp-01
    ipAddress: 10.50.0.11
    controlPlane: true
    installDisk: /dev/disk/by-id/ata-SSD_128GB_2021092600394
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "84:47:09:07:c6:4a"
        dhcp: false
        vlans:
          - vlanId: 50
            mtu: 1500
            dhcp: false
            addresses:
              - 10.50.0.11/24
            routes:
              - network: 0.0.0.0/0
                gateway: 10.50.0.1
            vip:
              ip: 10.50.0.10
          - vlanId: 10
            mtu: 1500
            dhcp: false
            addresses:
              - 10.10.0.11/24
    patches:
      - "@./patches/nodes/orion-cp-01.yaml"

  - hostname: orion-cp-02
    ipAddress: 10.50.0.12
    controlPlane: true
    installDisk: /dev/disk/by-id/ata-SSD_128GB_2021092601145
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "84:47:09:07:c4:ff"
        dhcp: false
        vlans:
          - vlanId: 50
            mtu: 1500
            dhcp: false
            addresses:
              - 10.50.0.12/24
            routes:
              - network: 0.0.0.0/0
                gateway: 10.50.0.1
            vip:
              ip: 10.50.0.10
          - vlanId: 10
            mtu: 1500
            dhcp: false
            addresses:
              - 10.10.0.12/24
    patches:
      - "@./patches/nodes/orion-cp-02.yaml"

  - hostname: orion-cp-03
    ipAddress: 10.50.0.13
    controlPlane: true
    installDisk: /dev/disk/by-id/ata-ORICO_250929CA12802668
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "5c:85:7e:4f:a2:92"
        dhcp: false
        vlans:
          - vlanId: 50
            mtu: 1500
            dhcp: false
            addresses:
              - 10.50.0.13/24
            routes:
              - network: 0.0.0.0/0
                gateway: 10.50.0.1
            vip:
              ip: 10.50.0.10
          - vlanId: 10
            mtu: 1500
            dhcp: false
            addresses:
              - 10.10.0.13/24
    patches:
      - "@./patches/nodes/orion-cp-03.yaml"

  # ── Workers ────────────────────────────────────────────────────────────────
  # Hardware: Bosgame — trunk NIC is enp1s0, boot disk is Kingston 1 TB NVMe
  # (enp2s0 also exists; it carried stale VLANs from the old doubled-interface
  # bug and will be absent from the new render)

  - hostname: orion-w-01
    ipAddress: 10.50.0.21
    controlPlane: false
    installDisk: /dev/disk/by-id/nvme-KINGSTON_OM8PGP41024N-A0_50026B7383880325
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "84:47:09:53:24:d6"
        dhcp: false
        vlans:
          - vlanId: 50
            mtu: 1500
            dhcp: false
            addresses:
              - 10.50.0.21/24
            routes:
              - network: 0.0.0.0/0
                gateway: 10.50.0.1
          - vlanId: 10
            mtu: 1500
            dhcp: false
            addresses:
              - 10.10.0.21/24
    patches:
      - "@./patches/nodes/orion-w-01.yaml"

  - hostname: orion-w-02
    ipAddress: 10.50.0.22
    controlPlane: false
    installDisk: /dev/disk/by-id/nvme-KINGSTON_OM8PGP41024N-A0_50026B738388057D
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "84:47:09:53:28:36"
        dhcp: false
        vlans:
          - vlanId: 50
            mtu: 1500
            dhcp: false
            addresses:
              - 10.50.0.22/24
            routes:
              - network: 0.0.0.0/0
                gateway: 10.50.0.1
          - vlanId: 10
            mtu: 1500
            dhcp: false
            addresses:
              - 10.10.0.22/24
    patches:
      - "@./patches/nodes/orion-w-02.yaml"
