alertmanager:
  ingress:
    enabled: true
    ingressClassName: cilium
    hosts:
      - "alertmanager.${domain}"
grafana:
  ingress:
    enabled: true
    ingressClassName: cilium
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - "grafana.${domain}"
    tls:
      - secretName: grafana-tls
        hosts:
          - "grafana.${domain}"
vmagent:
  ingress:
    enabled: true
    ingressClassName: cilium
    hosts:
      - "vmagent.${domain}"
vmalert:
  ingress:
    enabled: true
    ingressClassName: cilium
    hosts:
      - "vmalert.${domain}"
vmsingle:
  spec:
    storage: null
  ingress:
    enabled: true
    ingressClassName: cilium
    hosts:
      - "vmsingle.${domain}"
