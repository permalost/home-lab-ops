---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  interval: 30m
  upgrade:
    remediation:
      remediateLastHelmReleaseRevision: true
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: vkms
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: vkms-helm-chart-values
      valuesKey: values.yaml
