apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.*"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
      interval: 24h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    provider:
      name: pihole
    sources:
      - gateway-httproute
    domainFilters:
      - ${domain}
    registry: noop
    policy: upsert-only
    extraArgs:
      - --pihole-server=http://pihole-svc.pihole.svc.cluster.local
      - --pihole-api-version=6
    env:
      - name: EXTERNAL_DNS_PIHOLE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: external-dns-pihole
            key: password
    rbac:
      create: true
    serviceAccount:
      create: true
