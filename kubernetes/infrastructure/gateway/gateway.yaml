apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: orion
  namespace: gateway
  annotations:
    io.cilium/lb-ipam-ips: "10.50.0.230"
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.${domain}"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-orion-tls
            namespace: cilium
      allowedRoutes:
        namespaces:
          from: All
