apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: coredns
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 1m
  timeout: 3m
  prune: false
  wait: true
  dependsOn:
    - name: cluster-settings
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/coredns
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
