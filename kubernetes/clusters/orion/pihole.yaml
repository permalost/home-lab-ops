apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pihole
  namespace: flux-system
spec:
  dependsOn:
    - name: cilium
    - name: gateway
    - name: cert-manager-issuers
    - name: cluster-settings
  interval: 1h
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/apps/pihole2/overlays/orion
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substitute:
      appName: pihole
      subdomain: dns
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
