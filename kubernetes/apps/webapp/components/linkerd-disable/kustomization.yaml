apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Deployment
      name: deploy
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: deploy
      spec:
        template:
          metadata:
            annotations:
              linkerd.io/inject: disabled
